name: Checagem de saldo (a cada hora)

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

jobs:
  check-balances:
    runs-on: ubuntu-latest
    steps:
      - name: Chamar endpoint de checagem de saldo
        run: |
          status=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://meta-payments-one.vercel.app/api/cron/check-balances")
          cat /tmp/response.json
          echo ""
          if [ "$status" -ge 300 ]; then
            echo "Checagem falhou com status $status"
            exit 1
          fi
